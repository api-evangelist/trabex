apis:
  - aid: trabex:trade-compliance
    name: Trabex Trade Compliance API
    description: >-
      The Trabex Trade Compliance API provides programmatic access to export
      compliance automation including shipment data submission, export
      documentation generation, Automated Export System (AES) filing, and
      restricted party screening. The API enables organizations to integrate
      compliance workflows into logistics and ERP systems, supporting single
      shipments, batch screening, and continuous compliance operations.
