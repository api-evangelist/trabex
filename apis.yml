aid: trabex
name: Trabex
description: >-
  Trabex is a trade compliance platform that provides automated export
  compliance, shipment management, restricted party screening, and Automated
  Export System (AES) filing services. Trabex offers APIs for integrating trade
  compliance workflows including shipment data ingestion, export documentation
  generation, financial reporting, and ancillary compliance data to help
  organizations manage global trade risk.
type: Index
